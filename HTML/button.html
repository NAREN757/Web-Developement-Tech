<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input form elements</title>
</head>
<body>
    <form action="/server">
    <div>
        <label for="username">Enter your Username :</label>
        <input type="text" id="username" placeholder="Username" name="user">
    </div>
 <hr>
    <div>
        <label for="password">Enter your Password :</label>
        <input type="password" id="password" placeholder="Password" name="pass">
    </div>
<hr>
    <!-- Age -->
<div>
    <label for="age">Enter your Age :</label>
    <input type="number" id="age" placeholder="Age" name="age">
</div>
<hr>
<!-- Color -->
<div>
    <label for="color">Choose a Color :</label>
    <input type="color" id="color" name="col">
</div>
<hr>
<!-- Time -->
<div>
    <label for="time">Select Time :</label>
    <input type="time" id="time" name="time">
</div>
<hr>
<!-- Date -->
<div>
    <label for="date">Select Date :</label>
    <input type="date" id="date" name="date">
</div>
<hr>

<div>
    <input type="checkbox" name="info" id="info" >
    <label for="info">Entered all Info</label>
</div>
<hr>
<button>Submit</button>
</form>
</body>
</html>
