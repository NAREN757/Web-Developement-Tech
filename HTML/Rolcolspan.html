<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row and coloumn span</title>
</head>
<body>
    <table border="black">
        <caption>Fruit Prices</caption>
        <tr>
            <th rowspan="2">Item</th>
            <th colspan="2">Price</th>
        </tr>
        <tr>
            <th>INR</th>
            <th>USD</th>
        </tr>
        <tr>
            <td>Mango</td>
            <td>20</td>
            <td>12.5</td>
        </tr>
        <tr>
            <td>Apple</td>
            <td>9</td>
            <td>4.5</td>
        </tr>
        <tr>
            <td>Banana</td>
            <td>10</td>
            <td>7.5</td>
        </tr>
    </table>
<br>
    <table border="black">
        <caption>A test table with merged cells</caption>
        <tr>
            <th rowspan="2"></th>
            <th colspan="2">Average</th>
            <th rowspan="2"> Red eyes</th>
        </tr>
        <tr>
            <th>Height</th>
            <th>Weight</th>
        </tr>
        <tr>
            <td>Males</td>
            <td>1.9</td>
            <td>0.003</td>
            <td>40%</td>
        </tr>
        <tr>
            <td>Females</td>
            <td>1.7</td>
            <td>0.002</td>
            <td>43%</td>
        </tr>
    </table>
</body>
</html>
