<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List Types</title>
</head>
<body>
    <ol>
        <li>Butter</li>
        <li>Jam</li>
        <li>Bread</li>
        <li>Salt</li>
    </ol>

     <ol type="A">
        <li>Butter</li>
        <li>Jam</li>
        <li>Bread</li>
        <li>Salt</li>
    </ol>

     <ol type="i">
        <li>Butter</li>
        <li>Jam</li>
        <li>Bread</li>
        <li>Salt</li>
    </ol>
</body>
</html>
